name: Lyric Scroll
version: "0.1.0"
slug: lyric_scroll
description: Display synchronized karaoke-style lyrics for currently playing music
url: https://github.com/loydmilligan/lyric-scroll
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:microphone-variant
panel_title: Lyrics
options:
  media_players: []
  sync_offset_ms: 0
  display_mode: scroll
  theme: dark
  font_size: large
schema:
  media_players:
    - entity_id?
  sync_offset_ms: int
  display_mode: list(scroll|page|focus)
  theme: list(dark|light|oled)
  font_size: list(small|medium|large|xlarge)
map:
  - data:rw
